<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Tee Bets — set up golf side games, score on every phone, and settle up. Privacy and support.">
<link rel="icon" href="data:,">
<title>Tee Bets</title>
<style>
  :root { --navy:#0F172A; --green:#16A34A; --muted:#64748B; --bg:#F8FAFC; --line:#E2E8F0; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--navy);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:680px; margin:0 auto; padding:72px 24px 80px; text-align:center; }
  .mark { display:inline-block; background:var(--green); color:#fff; font-weight:700; letter-spacing:-0.02em;
    padding:10px 18px; border-radius:14px; font-size:22px; }
  h1 { margin:26px 0 8px; font-size:34px; letter-spacing:-0.02em; }
  .lead { color:#1E293B; font-size:18px; max-width:560px; margin:0 auto 14px; }
  .tag { color:var(--muted); font-size:15px; margin-bottom:34px; }
  .links { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  a.btn { text-decoration:none; border:1px solid var(--line); background:#fff; color:var(--navy);
    padding:12px 22px; border-radius:12px; font-weight:600; }
  a.btn:hover { border-color:var(--green); color:var(--green); }
  footer { margin-top:54px; color:var(--muted); font-size:14px; }
  footer a { color:var(--green); }
</style>
</head>
<body>
<div class="wrap">
  <span class="mark">Tee&nbsp;Bets</span>
  <h1>Golf games, scored &amp; settled</h1>
  <p class="lead">Set up the side games your group is playing, score on everyone's phone, and know exactly
  who owes whom at the 19th hole.</p>
  <p class="tag">A bet tracker &amp; settlement calculator — it never handles money.</p>
  <div class="links">
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn" href="support.html">Support</a>
  </div>
  <footer>© 2026 Bo Nicholson · <a href="mailto:bora.nicholson6@gmail.com">bora.nicholson6@gmail.com</a></footer>
</div>
</body>
</html>
